name: CI/CD Pipeline

 on:
   push:
     branches: [ main ]

 jobs:
   build:
     runs-on: ubuntu-latest

     steps:
     - name: Checkout Code
       uses: actions/checkout@v2

     - name: Set up Docker Buildx
       uses: docker/setup-buildx-action@v1

     - name: Log in to Amazon ECR
       id: login-ecr
       uses: aws-actions/amazon-ecr-login@v1

     - name: Build and Push Docker Image
       run: |
         docker build -t mlops-flask-app .
         docker tag mlops-flask-app:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/mlops-flask-app:latest
         docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/mlops-flask-app:latest

     - name: Deploy to AWS App Runner
       uses: aws-actions/aws-apprunner-deploy@v1
       with:
         service-name: mlops-flask-app-service
         image-repository: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/mlops-flask-app:latest
         region: us-east-1
